<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聽障專業輔助轉寫</title>
    <style>
        :root { --bg: #f4f4f9; --text: #333; --box: #fff; }
        .dark-mode { --bg: #1a1a1a; --text: #eee; --box: #333; }
        body { font-family: sans-serif; padding: 10px; background-color: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        .container { max-width: 600px; margin: auto; }
        #output { border: 2px solid #ddd; padding: 15px; height: 45vh; background: var(--box); border-radius: 10px; white-space: pre-wrap; font-size: 24px; overflow-y: auto; margin-bottom: 10px; }
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
        .btn-main { background-color: #28a745; color: white; }
        .btn-stop { background-color: #dc3545; color: white; }
        .btn-sub { background-color: #6c757d; color: white; }
        .info-bar { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">即時輔助轉寫系統</h2>
        
        <div class="info-bar">
            <span id="word-count">字數: 0</span>
            <button onclick="toggleDarkMode()">切換深色/淺色</button>
        </div>

        <div class="grid-btns">
            <button id="start-btn" class="btn-main">開始聆聽</button>
            <button id="stop-btn" class="btn-stop" disabled>停止</button>
        </div>

        <div class="grid-btns">
            <button onclick="copyText()" class="btn-sub">複製內容</button>
            <button onclick="downloadText()" class="btn-sub">匯出 .txt</button>
        </div>

        <div class="controls-small" style="margin-bottom:10px">
            <input type="checkbox" id="privacyMode" onchange="togglePrivacy()"> <label>隱私模式 (僅顯示最終結果)</label>
        </div>

        <div id="output"></div>
    </div>

    <script>
        const output = document.getElementById('output');
        const wordCount = document.getElementById('word-count');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        
        recognition.lang = 'zh-TW';
        recognition.continuous = true;
        recognition.interimResults = true;

        let finalTranscript = '';
        let privacyMode = false;

        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
        function togglePrivacy() { privacyMode = document.getElementById('privacyMode').checked; }

        recognition.onresult = (event) => {
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript + ' ';
                else if (!privacyMode) interim += event.results[i][0].transcript;
            }
            output.innerText = finalTranscript + interim;
            wordCount.innerText = "字數: " + output.innerText.length;
            output.scrollTop = output.scrollHeight;
        };

        // 綁定事件
        document.getElementById('start-btn').onclick = () => recognition.start();
        document.getElementById('stop-btn').onclick = () => recognition.stop();
        
        function copyText() { navigator.clipboard.writeText(output.innerText); alert("已複製"); }
        function downloadText() {
            const blob = new Blob([output.innerText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = '筆記.txt'; a.click();
        }
    </script>
</body>
</html>
