<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時語音轉文字</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; }
        #output { border: 2px solid #ddd; padding: 20px; min-height: 400px; background: white; border-radius: 10px; white-space: pre-wrap; font-size: 24px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; color: white; }
        #start-btn { background-color: #28a745; }
        #stop-btn { background-color: #dc3545; }
        .status { padding: 10px; border-radius: 5px; margin-bottom: 10px; font-weight: bold; }
        .listening { background-color: #ffc107; }
    </style>
</head>
<body>
    <div class="container">
        <h1>聽障輔助語音轉文字</h1>
        <div class="controls">
            <button id="start-btn">開始聆聽</button>
            <button id="stop-btn" disabled>停止</button>
            <button onclick="clearText()" style="background-color: #6c757d;">清除紀錄</button>
        </div>
        <div id="status-bar" class="status">狀態：等待中</div>
        <div id="output"></div>
    </div>

    <script>
        const output = document.getElementById('output');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const status = document.getElementById('status-bar');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.continuous = true;
        recognition.interimResults = true;

        let finalTranscript = '';

        recognition.onstart = () => {
            status.innerText = "狀態：正在聆聽...";
            status.classList.add('listening');
            startBtn.disabled = true;
            stopBtn.disabled = false;
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript + ' ';
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }
            output.innerText = finalTranscript + interimTranscript;
        };

        recognition.onend = () => {
            status.innerText = "狀態：已停止";
            status.classList.remove('listening');
            startBtn.disabled = false;
            stopBtn.disabled = true;
        };

        startBtn.onclick = () => recognition.start();
        stopBtn.onclick = () => recognition.stop();
        function clearText() {
            finalTranscript = '';
            output.innerText = '';
        }
    </script>
</body>
</html>
