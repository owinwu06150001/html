<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聽障輔助語音轉文字</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background-color: #f4f4f9; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        #output { border: 2px solid #ddd; padding: 15px; height: 60vh; background: white; border-radius: 10px; white-space: pre-wrap; font-size: 20px; overflow-y: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        button { padding: 15px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; color: white; font-weight: bold; }
        #start-btn { background-color: #28a745; }
        #stop-btn { background-color: #dc3545; }
        .secondary-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .status { padding: 8px; border-radius: 5px; margin-bottom: 10px; font-weight: bold; text-align: center; background: #ddd; }
        .listening { background-color: #ffc107; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">語音轉文字</h2>
        <div id="status-bar" class="status">狀態：等待中</div>
        <div class="controls">
            <button id="start-btn">開始聆聽</button>
            <button id="stop-btn" disabled>停止</button>
        </div>
        <div class="secondary-btns">
            <button onclick="copyText()" style="background-color: #007bff;">複製文字</button>
            <button onclick="clearText()" style="background-color: #6c757d;">清除紀錄</button>
        </div>
        <div id="output"></div>
    </div>

    <script>
        const output = document.getElementById('output');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const status = document.getElementById('status-bar');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.continuous = true;
        recognition.interimResults = true;

        let finalTranscript = '';

        recognition.onstart = () => {
            status.innerText = "狀態：正在聆聽...";
            status.classList.add('listening');
            startBtn.disabled = true;
            stopBtn.disabled = false;
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript + ' ';
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }
            output.innerText = finalTranscript + interimTranscript;
            // 自動捲動到底部
            output.scrollTop = output.scrollHeight;
        };

        recognition.onend = () => {
            status.innerText = "狀態：已停止";
            status.classList.remove('listening');
            startBtn.disabled = false;
            stopBtn.disabled = true;
        };

        startBtn.onclick = () => recognition.start();
        stopBtn.onclick = () => recognition.stop();
        
        function clearText() {
            finalTranscript = '';
            output.innerText = '';
        }

        function copyText() {
            navigator.clipboard.writeText(output.innerText).then(() => {
                alert("文字已複製到剪貼簿");
            });
        }
    </script>
</body>
</html>
